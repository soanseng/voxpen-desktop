name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-core:
    name: Test voxink-core
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Run tests
        run: cargo test -p voxink-core --manifest-path src-tauri/Cargo.toml

      - name: Run clippy
        run: cargo clippy -p voxink-core --manifest-path src-tauri/Cargo.toml -- -D warnings

  build-tauri:
    name: Build Tauri (${{ matrix.label }})
    needs: test-core
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            label: Linux
          - platform: macos-latest
            label: macOS
          - platform: windows-latest
            label: Windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libxdo-dev

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm build

      - name: Build Tauri app (debug)
        run: cargo build --manifest-path src-tauri/Cargo.toml

      - name: Clippy (full crate)
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.label }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: '--target x86_64-pc-windows-msvc --bundles nsis'
            rust_target: x86_64-pc-windows-msvc
            label: Windows-x64
          - platform: macos-latest
            args: '--target aarch64-apple-darwin --bundles dmg'
            rust_target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: ubuntu-22.04
            args: '--bundles appimage deb'
            rust_target: ''
            label: Linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            libasound2-dev \
            patchelf

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_target || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ''
        with:
          args: ${{ matrix.args }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.label }}
          path: |
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.exe
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.sig
            src-tauri/target/**/release/bundle/**/*.json
          if-no-files-found: error

  publish:
    name: Publish to voxpen-releases
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Flatten release files
        run: |
          mkdir -p release-files
          find artifacts -type f \( \
            -name '*.dmg' -o \
            -name '*.exe' -o \
            -name '*.AppImage' -o \
            -name '*.deb' -o \
            -name '*.sig' \
          \) -exec cp {} release-files/ \;
          ls -la release-files/

      - name: Generate latest.json for Tauri updater
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          BASE_URL="https://github.com/soanseng/voxpen-releases/releases/download/${TAG}"

          # Find signature files
          WINDOWS_SIG=""
          MACOS_SIG=""
          LINUX_SIG=""

          for f in release-files/*.exe.sig; do
            [ -f "$f" ] && WINDOWS_SIG=$(cat "$f")
          done
          for f in release-files/*.dmg.sig; do
            [ -f "$f" ] && MACOS_SIG=$(cat "$f")
          done
          for f in release-files/*.AppImage.sig; do
            [ -f "$f" ] && LINUX_SIG=$(cat "$f")
          done

          # Find artifact filenames
          WINDOWS_FILE=$(ls release-files/*.exe 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          MACOS_FILE=$(ls release-files/*.dmg 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")
          LINUX_FILE=$(ls release-files/*.AppImage 2>/dev/null | head -1 | xargs basename 2>/dev/null || echo "")

          # Build latest.json
          cat > release-files/latest.json << ENDJSON
          {
            "version": "${VERSION}",
            "notes": "VoxPen Desktop ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": {
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/${WINDOWS_FILE}"
              },
              "darwin-aarch64": {
                "signature": "${MACOS_SIG}",
                "url": "${BASE_URL}/${MACOS_FILE}"
              },
              "linux-x86_64": {
                "signature": "${LINUX_SIG}",
                "url": "${BASE_URL}/${LINUX_FILE}"
              }
            }
          }
          ENDJSON

          cat release-files/latest.json

      - name: Create release on voxpen-releases
        uses: softprops/action-gh-release@v2
        with:
          repository: soanseng/voxpen-releases
          token: ${{ secrets.RELEASE_PAT }}
          tag_name: ${{ github.ref_name }}
          name: 'VoxPen Desktop ${{ github.ref_name }}'
          body: |
            ## Downloads / 下載

            | Platform / 平台 | File / 檔案 | Notes / 說明 |
            |----------|------|-------|
            | **Windows x64** | `.exe` (NSIS installer) | 不需管理員權限 / No admin required |
            | **macOS arm64** | `.dmg` (Apple Silicon) | M1 / M2 / M3+ |
            | **Linux x64** | `.AppImage` / `.deb` | AppImage 適用所有發行版 |

            ### ⚠️ Windows Security / Windows 安全提示
            This app is **not code-signed**. Windows SmartScreen may show a warning.
            Click **"More info"** → **"Run anyway"** to proceed.

            ### ⚠️ macOS Security / macOS 安全提示
            This app is **not notarized**. Right-click → **Open** → **Open** to bypass.
            If "damaged": `xattr -cr /Applications/VoxPen\ Desktop.app`
          draft: false
          prerelease: false
          files: release-files/*

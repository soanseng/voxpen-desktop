<svg viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1528"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <!-- Subtle radial warmth in center -->
    <radialGradient id="warmCenter" cx="0.5" cy="0.48" r="0.45">
      <stop offset="0%" stop-color="#1e2245" stop-opacity="1"/>
      <stop offset="100%" stop-color="#0f1528" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#warmCenter)"/>
  <!-- Minimal texture dots for depth -->
  <g opacity="0.04">
    <circle cx="180" cy="280" r="2" fill="#c9b896"/>
    <circle cx="380" cy="130" r="1.5" fill="#c9b896"/>
    <circle cx="680" cy="230" r="2" fill="#c9b896"/>
    <circle cx="830" cy="380" r="1.2" fill="#c9b896"/>
    <circle cx="280" cy="680" r="1.5" fill="#c9b896"/>
    <circle cx="730" cy="630" r="2" fill="#c9b896"/>
    <circle cx="150" cy="550" r="1.2" fill="#c9b896"/>
    <circle cx="600" cy="820" r="1.8" fill="#c9b896"/>
    <circle cx="870" cy="700" r="1" fill="#c9b896"/>
  </g>
</svg>
